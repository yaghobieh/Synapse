<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="grad128" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#9333EA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#A855F7;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="glow128">
      <stop offset="0%" style="stop-color:#A855F7;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0" />
    </radialGradient>
  </defs>
  
  <!-- Background glow -->
  <circle cx="64" cy="64" r="50" fill="url(#glow128)"/>
  
  <!-- Central node (state store) -->
  <circle cx="64" cy="64" r="12" fill="url(#grad128)"/>
  <circle cx="64" cy="64" r="8" fill="#A855F7"/>
  
  <!-- Inner ring of nodes -->
  <circle cx="64" cy="40" r="6" fill="url(#grad128)"/>
  <circle cx="82" cy="52" r="6" fill="url(#grad128)"/>
  <circle cx="82" cy="76" r="6" fill="url(#grad128)"/>
  <circle cx="64" cy="88" r="6" fill="url(#grad128)"/>
  <circle cx="46" cy="76" r="6" fill="url(#grad128)"/>
  <circle cx="46" cy="52" r="6" fill="url(#grad128)"/>
  
  <!-- Outer ring of nodes -->
  <circle cx="64" cy="20" r="5" fill="#A855F7"/>
  <circle cx="92" cy="36" r="5" fill="#A855F7"/>
  <circle cx="100" cy="64" r="5" fill="#A855F7"/>
  <circle cx="92" cy="92" r="5" fill="#A855F7"/>
  <circle cx="64" cy="108" r="5" fill="#A855F7"/>
  <circle cx="36" cy="92" r="5" fill="#A855F7"/>
  <circle cx="28" cy="64" r="5" fill="#A855F7"/>
  <circle cx="36" cy="36" r="5" fill="#A855F7"/>
  
  <!-- Connection lines from center to inner ring -->
  <line x1="64" y1="64" x2="64" y2="40" stroke="url(#grad128)" stroke-width="2.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="82" y2="52" stroke="url(#grad128)" stroke-width="2.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="82" y2="76" stroke="url(#grad128)" stroke-width="2.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="64" y2="88" stroke="url(#grad128)" stroke-width="2.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="46" y2="76" stroke="url(#grad128)" stroke-width="2.5" opacity="0.6"/>
  <line x1="64" y1="64" x2="46" y2="52" stroke="url(#grad128)" stroke-width="2.5" opacity="0.6"/>
  
  <!-- Connection lines from inner to outer ring -->
  <line x1="64" y1="40" x2="64" y2="20" stroke="#A855F7" stroke-width="2" opacity="0.5"/>
  <line x1="82" y1="52" x2="92" y2="36" stroke="#A855F7" stroke-width="2" opacity="0.5"/>
  <line x1="82" y1="76" x2="92" y2="92" stroke="#A855F7" stroke-width="2" opacity="0.5"/>
  <line x1="64" y1="88" x2="64" y2="108" stroke="#A855F7" stroke-width="2" opacity="0.5"/>
  <line x1="46" y1="76" x2="36" y2="92" stroke="#A855F7" stroke-width="2" opacity="0.5"/>
  <line x1="46" y1="52" x2="36" y2="36" stroke="#A855F7" stroke-width="2" opacity="0.5"/>
  <line x1="82" y1="52" x2="100" y2="64" stroke="#A855F7" stroke-width="2" opacity="0.5"/>
  <line x1="46" y1="52" x2="28" y2="64" stroke="#A855F7" stroke-width="2" opacity="0.5"/>
</svg>
