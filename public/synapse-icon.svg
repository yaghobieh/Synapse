<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Gradient for the neural glow effect -->
    <linearGradient id="synapseGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A855F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C084FC;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Soft shadow -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7C3AED" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="#0F0F23" stroke="url(#synapseGradient)" stroke-width="3"/>
  
  <!-- Neural network nodes (neurons) -->
  <!-- Central node -->
  <circle cx="256" cy="256" r="35" fill="url(#synapseGradient)" filter="url(#glow)"/>
  <circle cx="256" cy="256" r="20" fill="#F8F8FF"/>
  
  <!-- Top nodes -->
  <circle cx="256" cy="120" r="25" fill="url(#synapseGradient)" filter="url(#glow)"/>
  <circle cx="256" cy="120" r="12" fill="#F8F8FF"/>
  
  <!-- Bottom nodes -->
  <circle cx="256" cy="392" r="25" fill="url(#synapseGradient)" filter="url(#glow)"/>
  <circle cx="256" cy="392" r="12" fill="#F8F8FF"/>
  
  <!-- Left nodes -->
  <circle cx="138" cy="188" r="22" fill="url(#synapseGradient)" filter="url(#glow)"/>
  <circle cx="138" cy="188" r="10" fill="#F8F8FF"/>
  
  <circle cx="138" cy="324" r="22" fill="url(#synapseGradient)" filter="url(#glow)"/>
  <circle cx="138" cy="324" r="10" fill="#F8F8FF"/>
  
  <!-- Right nodes -->
  <circle cx="374" cy="188" r="22" fill="url(#synapseGradient)" filter="url(#glow)"/>
  <circle cx="374" cy="188" r="10" fill="#F8F8FF"/>
  
  <circle cx="374" cy="324" r="22" fill="url(#synapseGradient)" filter="url(#glow)"/>
  <circle cx="374" cy="324" r="10" fill="#F8F8FF"/>
  
  <!-- Synaptic connections (lines) -->
  <g stroke="url(#synapseGradient)" stroke-width="3" stroke-linecap="round" opacity="0.8">
    <!-- Central to top -->
    <line x1="256" y1="221" x2="256" y2="145"/>
    
    <!-- Central to bottom -->
    <line x1="256" y1="291" x2="256" y2="367"/>
    
    <!-- Central to left nodes -->
    <line x1="221" y1="241" x2="160" y2="200"/>
    <line x1="221" y1="271" x2="160" y2="312"/>
    
    <!-- Central to right nodes -->
    <line x1="291" y1="241" x2="352" y2="200"/>
    <line x1="291" y1="271" x2="352" y2="312"/>
    
    <!-- Cross connections -->
    <line x1="256" y1="145" x2="160" y2="188" opacity="0.5"/>
    <line x1="256" y1="145" x2="352" y2="188" opacity="0.5"/>
    <line x1="256" y1="367" x2="160" y2="324" opacity="0.5"/>
    <line x1="256" y1="367" x2="352" y2="324" opacity="0.5"/>
    
    <!-- Outer connections -->
    <line x1="138" y1="210" x2="138" y2="302" opacity="0.4"/>
    <line x1="374" y1="210" x2="374" y2="302" opacity="0.4"/>
  </g>
  
  <!-- Pulse dots along connections (animated in CSS) -->
  <g fill="#E879F9">
    <circle cx="256" cy="175" r="4" opacity="0.8"/>
    <circle cx="256" cy="335" r="4" opacity="0.8"/>
    <circle cx="190" cy="218" r="4" opacity="0.8"/>
    <circle cx="190" cy="294" r="4" opacity="0.8"/>
    <circle cx="322" cy="218" r="4" opacity="0.8"/>
    <circle cx="322" cy="294" r="4" opacity="0.8"/>
  </g>
  
  <!-- "S" letter hint in center (subtle) -->
  <text x="256" y="268" 
        font-family="SF Pro Display, -apple-system, BlinkMacSystemFont, sans-serif" 
        font-size="32" 
        font-weight="700"
        fill="#7C3AED" 
        text-anchor="middle"
        opacity="0.15">S</text>
</svg>

