<!DOCTYPE html>
<html>
<head>
  <title>Generate Synapse Icons</title>
  <style>
    body { font-family: system-ui; padding: 20px; background: #1e1e1e; color: white; }
    canvas { border: 1px solid #333; margin: 10px; }
    button { padding: 10px 20px; margin: 10px; cursor: pointer; }
  </style>
</head>
<body>
  <h1>🐙 Synapse Icon Generator</h1>
  <p>Click each button to download the icon:</p>
  
  <div>
    <canvas id="c16" width="16" height="16"></canvas>
    <button onclick="download(16)">Download 16x16</button>
  </div>
  <div>
    <canvas id="c48" width="48" height="48"></canvas>
    <button onclick="download(48)">Download 48x48</button>
  </div>
  <div>
    <canvas id="c128" width="128" height="128"></canvas>
    <button onclick="download(128)">Download 128x128</button>
  </div>
  
  <script>
    const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
      <defs>
        <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#66d9ef"/>
          <stop offset="100%" stop-color="#4a9eb8"/>
        </linearGradient>
        <linearGradient id="tentacleGrad" x1="0%" y1="0%" x2="0%" y2="100%">
          <stop offset="0%" stop-color="#4a9eb8"/>
          <stop offset="100%" stop-color="#357a8c"/>
        </linearGradient>
      </defs>
      <ellipse cx="64" cy="44" rx="36" ry="32" fill="url(#bodyGrad)"/>
      <ellipse cx="50" cy="40" rx="8" ry="10" fill="white"/>
      <ellipse cx="78" cy="40" rx="8" ry="10" fill="white"/>
      <circle cx="52" cy="42" r="4" fill="#2f3129"/>
      <circle cx="80" cy="42" r="4" fill="#2f3129"/>
      <circle cx="53" cy="41" r="1.5" fill="white"/>
      <circle cx="81" cy="41" r="1.5" fill="white"/>
      <rect x="46" y="56" width="36" height="28" rx="4" fill="#a6e22e" opacity="0.9"/>
      <text x="64" y="74" text-anchor="middle" font-family="monospace" font-size="10" fill="#2f3129" font-weight="bold">{S}</text>
      <path d="M28 76 Q20 90 16 105 Q14 115 22 118" stroke="url(#tentacleGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M38 80 Q28 95 24 108 Q22 118 30 120" stroke="url(#tentacleGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M46 82 Q40 95 38 108 Q36 118 44 120" stroke="url(#tentacleGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
      <path d="M100 76 Q108 90 112 105 Q114 115 106 118" stroke="url(#tentacleGrad)" stroke-width="8" fill="none" stroke-linecap="round"/>
      <path d="M90 80 Q100 95 104 108 Q106 118 98 120" stroke="url(#tentacleGrad)" stroke-width="7" fill="none" stroke-linecap="round"/>
      <path d="M82 82 Q88 95 90 108 Q92 118 84 120" stroke="url(#tentacleGrad)" stroke-width="6" fill="none" stroke-linecap="round"/>
    </svg>`;
    
    function renderIcon(size) {
      const canvas = document.getElementById('c' + size);
      const ctx = canvas.getContext('2d');
      const img = new Image();
      const blob = new Blob([svg], {type: 'image/svg+xml'});
      const url = URL.createObjectURL(blob);
      
      img.onload = () => {
        ctx.clearRect(0, 0, size, size);
        ctx.drawImage(img, 0, 0, size, size);
        URL.revokeObjectURL(url);
      };
      img.src = url;
    }
    
    function download(size) {
      const canvas = document.getElementById('c' + size);
      const link = document.createElement('a');
      link.download = `icon${size}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
    
    // Render all
    [16, 48, 128].forEach(renderIcon);
  </script>
</body>
</html>
