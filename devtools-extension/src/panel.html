<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Synapse DevTools</title>
  <link rel="stylesheet" href="panel.css">
</head>
<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div id="logo">Synapse</div>
      <input type="text" id="search" placeholder="Filter actions..." />
      <button id="btn-snap" class="hdr-btn" title="Take snapshot">Snap</button>
      <button id="btn-export" class="hdr-btn" title="Export state">Export</button>
      <button id="btn-import" class="hdr-btn" title="Import state">Import</button>
      <button id="btn-clear" class="hdr-btn" title="Clear history">Clear</button>
    </header>

    <!-- Body -->
    <div id="body">
      <!-- Left: Actions -->
      <div id="left">
        <div id="left-hd">Actions <span id="act-count">0</span></div>
        <div id="act-list"></div>
        <!-- Snapshots drawer -->
        <div id="snap-section" class="hidden">
          <div id="snap-hd">Snapshots <span id="snap-count">0</span></div>
          <div id="snap-list"></div>
        </div>
      </div>

      <!-- Right: Detail -->
      <div id="right">
        <div id="detail-tabs" class="hidden">
          <button class="dtab active" data-tab="changes">Changes</button>
          <button class="dtab" data-tab="state">State</button>
          <button class="dtab" data-tab="raw">Raw</button>
        </div>
        <div id="detail-body"></div>
      </div>
    </div>

    <!-- Bottom: API -->
    <div id="bottom">
      <div id="bottom-hd">
        <span>API Calls</span>
        <span id="api-count">0</span>
      </div>
      <div id="api-body"></div>
    </div>

    <!-- Import Modal -->
    <div id="import-modal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-hd">Import State <button id="close-import">&times;</button></div>
        <textarea id="import-text" placeholder="Paste JSON..."></textarea>
        <div class="modal-ft"><button id="do-import">Import</button></div>
      </div>
    </div>

    <!-- Edit Modal -->
    <div id="edit-modal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-hd">Edit <span id="edit-label"></span> <button id="close-edit">&times;</button></div>
        <textarea id="edit-text"></textarea>
        <div class="modal-ft"><button id="do-edit">Apply</button></div>
      </div>
    </div>
  </div>
  <script src="panel.js"></script>
</body>
</html>
